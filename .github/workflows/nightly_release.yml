name: Nightly Rolling Release

on:
  workflow_dispatch:
  schedule:
    - cron: '37 2 * * *'

concurrency:
  group: nightly-build
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: "Battle Cats Complete"

jobs:
  check-changes:
    name: Check for New Commits
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare Commits
        id: compare
        run: |
          LATEST_SHA=$(git rev-parse HEAD)
          TAG_SHA=$(git rev-list -n 1 nightly 2>/dev/null || echo "none")
          
          echo "Latest commit: $LATEST_SHA"
          echo "Nightly tag commit: $TAG_SHA"
          
          if [ "$LATEST_SHA" == "$TAG_SHA" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "No new commits since last nightly. Aborting build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected (or manual trigger). Proceeding with build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: Build Windows Nightly
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Nightly (GUI)
        run: cargo build -p gui --release --features nightly --verbose

      - name: Rename and Zip (Windows)
        run: |
          move target\release\gui.exe "${{ env.BIN_NAME }}.exe"
          Compress-Archive -Path "${{ env.BIN_NAME }}.exe" -DestinationPath bcc_windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: bcc_windows.zip
          retention-days: 1

  build-linux:
    name: Build Linux Nightly
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Nightly (GUI)
        run: cargo build -p gui --release --features nightly --verbose

      - name: Prepare and Zip (Linux)
        run: |
          mv target/release/gui "${{ env.BIN_NAME }}"
          chmod +x "${{ env.BIN_NAME }}"
          zip bcc_linux.zip "${{ env.BIN_NAME }}"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: bcc_linux.zip
          retention-days: 1

  build-macos:
    name: Build MacOS Nightly
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Nightly (GUI)
        run: cargo build -p gui --release --features nightly --verbose

      - name: Prepare and Zip (Mac)
        run: |
          mv target/release/gui "${{ env.BIN_NAME }}"
          chmod +x "${{ env.BIN_NAME }}"
          zip bcc_mac.zip "${{ env.BIN_NAME }}"

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: bcc_mac.zip
          retention-days: 1

  publish-nightly:
    name: Publish Nightly Release
    needs: [check-changes, build-windows, build-linux, build-macos]
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4

      - name: Delete existing nightly release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        run: |
          gh release delete nightly --cleanup-tag -y || true
          git push --delete origin nightly || true

      - name: Create Nightly Release
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        run: |
          git tag nightly
          git push origin nightly
          
          gh release create "nightly" \
            --repo "${{ github.repository }}" \
            --title "Nightly" \
            --notes "Unstable build, use at your own risk. This release is automatically generated and contains bleeding-edge features." \
            --prerelease \
            windows-build/bcc_windows.zip \
            linux-build/bcc_linux.zip \
            mac-build/bcc_mac.zip
            mac-build/bcc_mac.zip