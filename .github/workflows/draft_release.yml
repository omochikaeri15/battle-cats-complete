name: Build & Draft Release

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Cargo.toml'
      - 'gui/Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: "Battle Cats Complete"

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      app_version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version from root Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep "^version" Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Check if tag exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          TAG="v$VERSION"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Version $TAG already exists."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version $TAG is new! Preparing release..."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: Build Windows
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release (GUI)
        run: cargo build -p gui --release --verbose

      - name: Rename and Zip (Windows)
        run: |
          move target\release\gui.exe "${{ env.BIN_NAME }}.exe"
          Compress-Archive -Path "${{ env.BIN_NAME }}.exe" -DestinationPath bcc_windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: bcc_windows.zip
          retention-days: 1

  build-linux:
    name: Build Linux
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release (GUI)
        run: cargo build -p gui --release --verbose

      - name: Prepare and Zip (Linux)
        run: |
          mv target/release/gui "${{ env.BIN_NAME }}"
          chmod +x "${{ env.BIN_NAME }}"
          zip bcc_linux.zip "${{ env.BIN_NAME }}"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: bcc_linux.zip
          retention-days: 1

  build-macos:
    name: Build MacOS
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release (GUI)
        run: cargo build -p gui --release --verbose

      - name: Prepare and Zip (Mac)
        run: |
          mv target/release/gui "${{ env.BIN_NAME }}"
          chmod +x "${{ env.BIN_NAME }}"
          zip bcc_mac.zip "${{ env.BIN_NAME }}"

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: bcc_mac.zip
          retention-days: 1

  create-release:
    name: Create Release Draft
    needs: [check-version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: List artifacts (Verification)
        run: ls -R

      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        run: |
          gh release create "v${{ needs.check-version.outputs.app_version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ needs.check-version.outputs.app_version }}" \
            --draft \
            windows-build/bcc_windows.zip \
            linux-build/bcc_linux.zip \
            mac-build/bcc_mac.zip